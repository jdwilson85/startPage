<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">

    <!-- Preconnect -->
    <link rel="preconnect" href="https://api.open-meteo.com" crossorigin>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="{{ '/assets/favicon/terminal.svg' | relative_url }}">

    <!-- Tailwind CSS (compiled) -->
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

    <!-- Font Awesome & Fonts (non-render-blocking) -->
    <link rel="stylesheet" href="{{ '/assets/css/fontawesome.min.css' | relative_url }}" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="{{ '/assets/css/solid.min.css' | relative_url }}" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="{{ '/assets/css/brands.min.css' | relative_url }}" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="{{ '/assets/css/fonts.css' | relative_url }}" media="print" onload="this.media='all'">
    <noscript>
        <link rel="stylesheet" href="{{ '/assets/css/fontawesome.min.css' | relative_url }}">
        <link rel="stylesheet" href="{{ '/assets/css/solid.min.css' | relative_url }}">
        <link rel="stylesheet" href="{{ '/assets/css/brands.min.css' | relative_url }}">
        <link rel="stylesheet" href="{{ '/assets/css/fonts.css' | relative_url }}">
    </noscript>
</head>
